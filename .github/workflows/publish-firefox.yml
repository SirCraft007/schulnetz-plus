name: Publish Firefox Add-on

on:
  push:
    branches:
      - main

concurrency:
  group: firefox-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Submit to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.FIREFOX_AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.FIREFOX_AMO_API_SECRET }}
        run: |
          pnpm dlx web-ext@8 sign \
            --source-dir dist \
            --channel listed \
            --amo-metadata .github/amo-metadata.json \
            --approval-timeout 0 \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET"
